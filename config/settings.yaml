# A股智能盯盘Agent 全局配置 (2026-05-20 重构版)

# 数据源
data:
  primary: "qveris"           # qveris | baostock
  qveris:
    api_key: ${QVERIS_API_KEY}
    base_url: "https://qveris.ai/api/v1"
    timeout: 30
    tool_daily: "mcp_gildata.stockdailyquote.v1"
    tool_live: "mcp_gildata.asharelivequote.v1"
    tool_index: "mcp_gildata.indexlivequote.v1"
    cost_per_call: 10          # credits
    budget_daily: 50           # 每日credits上限
  baostock:
    timeout: 30
    retry: 3
    retry_delay: 5
    cache_dir: "data/parquet"

# 存储路径
storage:
  duckdb_path: "data/stockradar.duckdb"
  parquet_dir: "data/parquet"

# 持仓配置
portfolio:
  size: 10
  watchlist_size: 10
  max_per_industry: 3
  max_turnover_monthly: 1.0

# 风控参数 (2026-05-20 重构)
risk:
  stop_loss: -0.12        # 从-0.15收紧
  reduce_loss: -0.06      # 从-0.08收紧
  reduce_ratio: 0.5
  crisis_reduce_ratio: 0.7
  max_single_day_drop: -0.08

# 策略级风控 (新增)
strategy_level_risk:
  enabled: true
  max_nav_drawdown: -0.10  # 净值回撤>10%停止买入
  min_capital_ratio: 0.85  # 本金回撤>15%停止买入
  recovery_wait_days: 7    # 触发风控后等待7天再评估

# 评分动量参数
scoring:
  delta_lookback: 5
  accel_lookback: 5
  urgent_delta_threshold: -1.5
  strong_delta_threshold: 1.0
  buffer_days: 3

# 换仓控制
rebalance:
  buffer_rank_start: 11
  buffer_rank_end: 20
  max_weekly_change: 2

# 数据生命周期
data_lifecycle:
  lookback_years: 10
  hot_data_days: 30

# 调度
schedule:
  data_update: "15:30"
  scoring: "16:00"
  strategy: "16:10"
  trade: "16:20"
  news: "16:30"
  report: "16:40"
  weekly_report: "Sun 20:00"

# LLM
llm:
  provider: "openai"
  base_url: ${LLM_BASE_URL}
  api_key: ${LLM_API_KEY}
  model: "glm-4"
  temperature: 0.1
  max_tokens: 2000
  max_concurrent: 10
  retry_times: 2
  retry_delay: 2.0
  cache_ttl_hours:
    earnings: 999999
    news_sentiment: 24
    stock_review: 48

# Telegram Bot
telegram:
  bot_token: ${TELEGRAM_BOT_TOKEN}
  chat_id: ${TELEGRAM_CHAT_ID}
  enabled: false
  alert_enabled: true
  daily_report: true

# 模拟交易
simulator:
  initial_capital: 1000000.0
  commission_rate: 0.00025
  stamp_tax_rate: 0.001
  slippage: 0.002
  min_lot: 100

# 日志
logging:
  level: "INFO"
  rotation: "100 MB"
  retention: "30 days"
  log_dir: "logs"

# 2026-05-20 重构关键变更：
# 1. 个股止损收紧（-15% → -12%）
# 2. 减亏阈值收紧（-8% → -6%）
# 3. 新增策略级风控（净值回撤>10%停止买入）
# 4. 新增本金回撤风控（本金亏损>15%停止买入）